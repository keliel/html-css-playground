<h2>Dropdownlist (aka
  <code>&lt;select&gt;</code>)
</h2>
<select>
  @for (option of options(); track option) {<option>{{ option.text }}</option>}</select>
<select>
  @for (group of groupedOptions(); track group) {
  <optgroup label="{{ group.category }}">
    @for (option of group.options; track option) {<option>{{ option.text }}</option>}
  </optgroup>
  }
</select>
